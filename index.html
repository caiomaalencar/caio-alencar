<style>

html, body{
    margin:0;
    padding:0;
    background:#dcdcdc;
    font-family:Arial, sans-serif;
    display:flex;
    justify-content:center;
}

.container{
    width:calc(100vw - 24px);
    max-width:350px;

    /* ALTERE ESTA LINHA */
    min-height:auto;

    background:#f5f5f5;
    border:3px solid #000;
    border-radius:28px;
    margin:10px auto;

    /* ALTERE ESTA LINHA */
    padding:16px 16px 10px 16px;

    box-sizing:border-box;
    text-align:center;
    box-shadow:0 8px 25px rgba(0,0,0,0.15);
}

.logo{
    width:92%;
    margin:0 auto 10px auto;
    display:block;
}

.nome{
    font-size:30px;
    font-weight:800;
    margin:6px 0 18px 0;
    color:#000;
}

.botao{
    width:100%;
    border:none;
    border-radius:18px;
    padding:16px 14px;
    margin-bottom:14px;
    font-size:19px;
    font-weight:700;
    text-decoration:none;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    box-sizing:border-box;
    box-shadow:0 5px 16px rgba(0,0,0,0.10);
}

.whatsapp{
    background:#27c756;
    color:#fff;
}

.branco{
    background:#ffffff;
    color:#111;
}

.info{
    background:#ffffff;
    border-radius:18px;
    padding:16px;
    margin-top:6px;
    margin-bottom:16px;
    text-align:left;
    font-size:15px;
    line-height:1.45;
    box-shadow:0 5px 16px rgba(0,0,0,0.10);
}

.info strong{
    font-weight:800;
}

.links{
    display:flex;
    gap:8px;
    margin-bottom:16px;
}

.links a{
    flex:1;
    background:#ffffff;
    color:#111;
    text-decoration:none;
    border-radius:14px;
    padding:12px 6px;
    font-size:11px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:5px;
    box-shadow:0 5px 16px rgba(0,0,0,0.10);
}

.salvar{
    width:100%;
    background:#ffffff;
    color:#111;
    text-decoration:none;
    border-radius:18px;
    padding:18px 10px;
    font-size:20px;
    font-weight:800;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    box-sizing:border-box;
    box-shadow:0 5px 16px rgba(0,0,0,0.10);
    margin-bottom:14px;
}

.qrcode{
    width:150px;
    margin:0 auto 6px auto;
    display:block;
}

.grupo{
    margin-top:4px;

    /* ALTERE ESTA LINHA */
    margin-bottom:0;

    color:#555;
    font-size:14px;
}

@media(max-width:390px){

    .container{
        width:calc(100vw - 18px);
        padding:14px 14px 8px 14px;
    }

    .nome{
        font-size:27px;
    }

    .botao{
        font-size:18px;
        padding:15px 12px;
    }

    .links a{
        font-size:10px;
        padding:10px 4px;
    }

    .qrcode{
        width:135px;
    }
}

</style>
